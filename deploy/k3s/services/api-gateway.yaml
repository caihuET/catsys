apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: cat-sys
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: cat-sys/api-gateway:v0.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9002
        envFrom:
        - configMapRef:
            name: cat-sys-config
        - secretRef:
            name: cat-sys-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 9002
          initialDelaySeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 9002
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: cat-sys
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
  - port: 9002
    targetPort: 9002
    nodePort: 30002
