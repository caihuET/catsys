apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
  namespace: cat-sys
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finance-service
  template:
    metadata:
      labels:
        app: finance-service
    spec:
      containers:
      - name: finance-service
        image: cat-sys/finance-service:v0.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5005
        envFrom:
        - configMapRef:
            name: cat-sys-config
        - secretRef:
            name: cat-sys-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: finance-service
  namespace: cat-sys
spec:
  selector:
    app: finance-service
  ports:
  - port: 5005
    targetPort: 5005
