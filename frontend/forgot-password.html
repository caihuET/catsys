<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>忘记密码 - 猫咪管理系统</title><script src="/js/api.js"></script><style>body{font-family:"Microsoft YaHei",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f4ff,#e8eeff,#fce4ec,#fff3e0,#f3e5f5)} catch(e) { alert("系统异常，请稍后再试"); }.card{background:#fff;border-radius:8px;width:400px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,0.08);margin:auto}.card h1{text-align:center;font-size:20px;color:#333;margin-bottom:24px}.field{margin-bottom:14px;width:100%;display:flex;flex-direction:column;align-items:stretch}.field label{display:block;font-size:13px;color:#666;margin-bottom:4px}.field input{width:100%;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none;box-sizing:border-box}.btn{width:100%;padding:10px;background:#1890ff;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer}.link{text-align:center;margin-top:12px;font-size:13px}.link a{color:#1890ff;text-decoration:none}</style></head><body><div class="card"><h1>忘记密码</h1><div class="field"><label>手机号</label><input id="phone" placeholder="请输入注册手机号"></div><div class="field"><label>验证码</label><div style="display:flex;gap:8px"><input id="code" placeholder="输入验证码" style="flex:1;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none"><button id="codeBtn" onclick="getCode()" style="white-space:nowrap;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer">获取验证码</button></div></div><div class="field"><label>新密码</label><input id="password" type="password" placeholder="请输入新密码"></div><div class="field"><label>确认密码</label><input id="confirm" type="password" placeholder="再次输入新密码"></div><button class="btn" onclick="doReset()">重置密码</button><div class="link"><a href="/">返回登录</a></div></div><script>
function validatePhone() {
    var inp = document.getElementById('phone');
    var btn = document.getElementById('codeBtn');
    var v = inp.value.trim();
    var valid = /^1\d{10}$/.test(v);
    var el = document.getElementById('phoneStatus');
    if (!el) {
        el = document.createElement('span');
        el.id = 'phoneStatus';
        el.style.cssText = 'position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:16px;font-weight:bold;';
        inp.parentNode.style.position = 'relative';
        inp.parentNode.appendChild(el);
    }
    if (v.length === 0) {
        inp.style.borderColor = '#d9d9d9'; el.textContent = ''; btn.disabled = true;
    } else if (valid) {
        inp.style.borderColor = '#52c41a'; el.textContent = '✓'; el.style.color = '#52c41a'; btn.disabled = false;
    } else {
        inp.style.borderColor = '#ff4d4f'; el.textContent = '✗'; el.style.color = '#ff4d4f'; btn.disabled = true;
    }
    btn.style.opacity = btn.disabled ? '0.4' : '1';
    btn.style.cursor = btn.disabled ? 'not-allowed' : 'pointer';
}
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('codeBtn').disabled = true;
    document.getElementById('codeBtn').style.opacity = '0.4';
    document.getElementById('phone').addEventListener('input', validatePhone);
});
function getClientId() {
    var id = localStorage.getItem('cat_sys_client_id');
    if (!id) { id = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); localStorage.setItem('cat_sys_client_id', id); }
    return id;
}
function getCode() {
    var phone = document.getElementById('phone').value;
    if (!phone || !/^1\d{10}$/.test(phone.trim())) { alert('请输入正确的中国大陆手机号'); return; }
    var btn = document.getElementById('codeBtn');
    btn.disabled = true;
    btn.textContent = '发送中...';
    api('/auth/send-code', { method: 'POST', body: JSON.stringify({ phone: phone, type: 'reset' }) }).then(function(r) {
        if (r.code === 0) {
            var s = 59;
            btn.textContent = s + 's';
            var t = setInterval(function() { s--; btn.textContent = s + 's'; if (s <= 0) { clearInterval(t); btn.disabled = false; btn.textContent = '获取验证码'; } }, 1000);
        } else {
            alert(r.detail || '发送失败');
            btn.disabled = false;
            btn.textContent = '获取验证码';
        }
    }).catch(function() { btn.disabled = false; btn.textContent = '获取验证码'; });
}
async function doReset() {
    var phone = document.getElementById('phone').value;
    var code = document.getElementById('code').value;
    var pass = document.getElementById('password').value;
    var confirm = document.getElementById('confirm').value;
    if (!phone || !code || !pass || !confirm) { alert('请填写所有必填项'); return; }
    if (pass !== confirm) { alert('两次密码不一致'); return; }
    try { var res = await api('/auth/reset-password', { method: 'POST', body: JSON.stringify({ phone: phone, password: pass, code: code }) });
    if (res.code === 0) {
        alert('密码重置成功，请登录');
        window.location.href = '/';
    } else {
        alert(res.detail || '重置失败');
    }
}

    } catch(e) { alert("系统异常，请稍后再试"); 
} catch(e) { alert('系统异常，请稍后再试'); }
</script></body></html>
