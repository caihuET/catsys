<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>忘记密码 - 猫咪管理系统</title><script src="/js/api.js"></script><style>body{font-family:"Microsoft YaHei",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f4ff,#e8eeff,#fce4ec,#fff3e0,#f3e5f5)}.card{background:#fff;border-radius:8px;width:400px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,0.08)}.card h1{text-align:center;font-size:20px;color:#333;margin-bottom:24px}.field{margin-bottom:14px}.field label{display:block;font-size:13px;color:#666;margin-bottom:4px}.field input{width:100%;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none}.btn{width:100%;padding:10px;background:#1890ff;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer}.link{text-align:center;margin-top:12px;font-size:13px}.link a{color:#1890ff;text-decoration:none}</style></head><body><div class="card"><h1>忘记密码</h1><div class="field"><label>手机号</label><input id="phone" placeholder="请输入注册手机号"></div><div class="field"><label>验证码</label><div style="display:flex;gap:8px"><input id="code" placeholder="输入验证码" style="flex:1;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none"><button onclick="getCode()" style="white-space:nowrap;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer">获取验证码</button></div></div><div class="field"><label>新密码</label><input id="password" type="password" placeholder="请输入新密码"></div><div class="field"><label>确认密码</label><input id="confirm" type="password" placeholder="再次输入新密码"></div><button class="btn">重置密码</button><div class="link"><a href="/">返回登录</a></div></div><script>function getCode(){let s=59;const btn=event.target;btn.disabled=true;btn.textContent=s+"s";const t=setInterval(function(){s--;btn.textContent=s+"s";if(s<=0){clearInterval(t);btn.disabled=false;btn.textContent="获取验证码";}},1000)}</script></body></html>
