<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>\u5fd8\u8bb0\u5bc6\u7801 - \u732b\u54aa\u7ba1\u7406\u7cfb\u7edf</title><script src="/js/api.js"></script><style>body{font-family:"Microsoft YaHei",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f4ff,#e8eeff,#fce4ec,#fff3e0,#f3e5f5)}.card{background:#fff;border-radius:8px;width:400px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,0.08);margin:auto}.card h1{text-align:center;font-size:20px;color:#333;margin-bottom:24px}.field{margin-bottom:14px;width:100%;display:flex;flex-direction:column;align-items:stretch}.field label{display:block;font-size:13px;color:#666;margin-bottom:4px}.field input{width:100%;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none;box-sizing:border-box}.btn{width:100%;padding:10px;background:#1890ff;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer}.link{text-align:center;margin-top:12px;font-size:13px}.link a{color:#1890ff;text-decoration:none}</style></head><body><div class="card"><h1>\u5fd8\u8bb0\u5bc6\u7801</h1><div class="field"><label>\u624b\u673a\u53f7</label><input id="phone" placeholder="\u8bf7\u8f93\u5165\u6ce8\u518c\u624b\u673a\u53f7"></div><div class="field"><label>\u9a8c\u8bc1\u7801</label><div style="display:flex;gap:8px"><input id="code" placeholder="\u8f93\u5165\u9a8c\u8bc1\u7801" style="flex:1;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none"><button id="codeBtn" onclick="getCode()" style="white-space:nowrap;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer">\u83b7\u53d6\u9a8c\u8bc1\u7801</button></div></div><div class="field"><label>\u65b0\u5bc6\u7801</label><input id="password" type="password" placeholder="\u8bf7\u8f93\u5165\u65b0\u5bc6\u7801"></div><div class="field"><label>\u786e\u8ba4\u5bc6\u7801</label><input id="confirm" type="password" placeholder="\u518d\u6b21\u8f93\u5165\u65b0\u5bc6\u7801"></div><button class="btn" onclick="doReset()">\u91cd\u7f6e\u5bc6\u7801</button><div class="link"><a href="/">\u8fd4\u56de\u767b\u5f55</a></div></div><script>
function validatePhone() {
    var inp = document.getElementById('phone');
    var btn = document.getElementById('codeBtn');
    var v = inp.value.trim();
    var valid = /^1[3-9]\\d{9}$/.test(v);
    var el = document.getElementById('phoneStatus');
    if (!el) {
        el = document.createElement('span');
        el.id = 'phoneStatus';
        el.style.cssText = 'position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:16px;font-weight:bold;';
        inp.parentNode.style.position = 'relative';
        inp.parentNode.appendChild(el);
    }
    if (v.length === 0) {
        inp.style.borderColor = '#d9d9d9'; el.textContent = ''; btn.disabled = true;
    } else if (valid) {
        inp.style.borderColor = '#52c41a'; el.textContent = '\u2713'; el.style.color = '#52c41a'; btn.disabled = false;
    } else {
        inp.style.borderColor = '#ff4d4f'; el.textContent = '\u2717'; el.style.color = '#ff4d4f'; btn.disabled = true;
    }
    btn.style.opacity = btn.disabled ? '0.4' : '1';
    btn.style.cursor = btn.disabled ? 'not-allowed' : 'pointer';
}
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('codeBtn').disabled = true;
    document.getElementById('codeBtn').style.opacity = '0.4';
    document.getElementById('phone').addEventListener('input', validatePhone);
});
function getClientId() {
    var id = localStorage.getItem('cat_sys_client_id');
    if (!id) { id = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); localStorage.setItem('cat_sys_client_id', id); }
    return id;
}
function getCode() {
    var phone = document.getElementById('phone').value;
    if (!phone || !/^1[3-9]\\d{9}$/.test(phone.trim())) { alert('\u8bf7\u8f93\u5165\u6b63\u786e\u7684\u4e2d\u56fd\u5927\u9646\u624b\u673a\u53f7'); return; }
    var btn = document.getElementById('codeBtn');
    btn.disabled = true;
    btn.textContent = '\u53d1\u9001\u4e2d...';
    api('/auth/send-code', { method: 'POST', body: JSON.stringify({ phone: phone, type: 'reset' }) }).then(function(r) {
        if (r.code === 0) {
            var s = 59;
            btn.textContent = s + 's';
            var t = setInterval(function() { s--; btn.textContent = s + 's'; if (s <= 0) { clearInterval(t); btn.disabled = false; btn.textContent = '\u83b7\u53d6\u9a8c\u8bc1\u7801'; } }, 1000);
        } else {
            alert(r.detail || '\u53d1\u9001\u5931\u8d25');
            btn.disabled = false;
            btn.textContent = '\u83b7\u53d6\u9a8c\u8bc1\u7801';
        }
    }).catch(function() { btn.disabled = false; btn.textContent = '\u83b7\u53d6\u9a8c\u8bc1\u7801'; });
}
async function doReset() {
    var phone = document.getElementById('phone').value;
    var code = document.getElementById('code').value;
    var pass = document.getElementById('password').value;
    var confirm = document.getElementById('confirm').value;
    if (!phone || !code || !pass || !confirm) { alert('\u8bf7\u586b\u5199\u6240\u6709\u5fc5\u586b\u9879'); return; }
    if (pass !== confirm) { alert('\u4e24\u6b21\u5bc6\u7801\u4e0d\u4e00\u81f4'); return; }
    var res = await api('/auth/reset-password', { method: 'POST', body: JSON.stringify({ phone: phone, password: pass, code: code }) });
    if (res.code === 0) {
        alert('\u5bc6\u7801\u91cd\u7f6e\u6210\u529f\uff0c\u8bf7\u767b\u5f55');
        window.location.href = '/';
    } else {
        alert(res.detail || '\u91cd\u7f6e\u5931\u8d25');
    }
}
</script></body></html>
