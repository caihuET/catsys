server {
    charset utf-8;
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    
    # API proxy
    location /cat/api/ {
        proxy_pass http://api-gateway:9002/cat/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Static files
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Health check
    location /health {
        return 200 "OK";
    }
}
