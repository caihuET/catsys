<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>猫咪管理 - 猫咪管理系统</title><script src="/js/api.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;font-size:14px}
.layout{display:flex;min-height:100vh}
.sidebar{width:200px;background:#001529;color:#fff}
.sidebar .logo{padding:16px;font-size:16px;font-weight:bold;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar .logo span{color:#1890ff}
.sidebar a{display:block;padding:10px 16px;color:rgba(255,255,255,0.65);text-decoration:none;font-size:13px}
.sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,0.08);color:#fff}
.main{flex:1}
.header{height:50px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.content{padding:20px}
h2{font-size:18px;margin-bottom:16px}
.toolbar{display:flex;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.toolbar .filters{display:flex;gap:6px;flex-wrap:wrap}
.btn{display:inline-block;padding:6px 14px;background:#1890ff;color:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer;text-decoration:none}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e8e8e8;font-size:13px}
th{background:#fafafa;padding:8px 8px;text-align:left;color:#666;border-bottom:2px solid #e8e8e8}
td{padding:6px 8px;border-bottom:1px solid #f0f0f0}
.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:11px}
.badge.green{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.badge.blue{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.badge.orange{background:#fff7e6;color:#fa8c16;border:1px solid #ffd591}
.badge.gray{background:#fafafa;color:#999;border:1px solid #d9d9d9}
.badge.red{background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}
.footer{font-size:12px;color:#999;margin-top:8px}
select,input{padding:4px 8px;border:1px solid #d9d9d9;border-radius:4px;font-size:12px}
</style></head><body>
<div class="layout">
<div class="sidebar">
<div class="logo"><span>猫</span>咪管理系统</div>
<a href="/dashboard.html">仪表盘</a>
<a href="/cats.html" class="active">猫咪管理</a>
<a href="/customers.html">客户管理</a>
<a href="#" onclick="logout()" style="margin-top:40px;border-top:1px solid rgba(255,255,255,0.1);padding-top:12px;">退出登录</a>
</div>
<div class="main">
<div class="header"><span></span><span id="userInfo"></span></div>
<div class="content">
<h2>猫咪管理</h2>
<div class="toolbar">
<div class="filters">
<input id="search" placeholder="搜索猫咪姓名" oninput="loadCats()">
<select id="filterStatus" onchange="loadCats()"><option value="">全部状态</option><option value="available">在售</option><option value="reserved">已预订</option><option value="sold">已售</option><option value="fostering">寄养</option><option value="retired">退役</option></select>
<select id="filterLive" onchange="loadCats()"><option value="">全部健康状况</option><option value="healthy">健康</option><option value="weak">体弱</option><option value="needs_checkup">待体检</option><option value="needs_deworming">待驱虫</option></select>
</div>
<a href="/cat-detail.html" class="btn">+ 新增猫咪</a>
</div>
<table><thead><tr><th>名字</th><th>品种</th><th>怫别</th><th>日龄(天)</th><th>到店</th><th>健康</th><th>绝育</th><th>状态</th><th>操作</th></tr></thead><tbody id="catList"></tbody></table>
<div class="footer" id="footer"></div>
</div></div></div>
<script>
const user = getUser();
if (!user) window.location.href = "/";
document.getElementById("userInfo").textContent = user.phone;

async function loadCats() {
    const s = document.getElementById("search").value;
    const st = document.getElementById("filterStatus").value;
    const lv = document.getElementById("filterLive").value;
    let url = "/cats?merchant_id=" + (user.merchant_id || 0);
    if (s) url += "&search=" + s;
    if (st) url += "&status=" + st;
    if (lv) url += "&live_status=" + lv;
    const r = await api(url);
    const tb = document.getElementById("catList");
    if (r.code !== 0 || !r.data.length) { tb.innerHTML = "<tr><td colspan=9 style='text-align:center;color:#999;padding:20px'>暂无数据</td></tr>"; return; }
    tb.innerHTML = r.data.map(c => "<tr><td>" + c.name + "</td><td>" + (c.breed||"-") + "</td><td>" + (c.gender||"-") + "</td><td>" + (c.age_days||"-") + "</td><td>" + (c.arrival_days?c.arrival_days+"?":"-") + "</td><td><span class='badge " + (c.live_status==="healthy"?"green":"orange") + "'>" + (c.live_status||"-") + "</span></td><td><span class='badge " + (c.neutered_status==="neutered"?"green":"gray") + "'>" + (c.neutered_status||"-") + "</span></td><td><span class='badge " + (c.status==="available"?"green":c.status==="reserved"?"blue":c.status==="sold"?"gray":c.status==="fostering"?"orange":"") + "'>" + (c.status||"-") + "</span></td><td><a href='/cat-detail.html?id=" + c.id + "'>查看</a></td></tr>").join("");
    document.getElementById("footer").textContent = "共 " + r.data.length + " 条";
}
loadCats();
</script></body></html>
