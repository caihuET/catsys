<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>注册 - 猫咪管理系统</title><script src="/js/api.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#f0f4ff,#e8eeff,#fce4ec,#fff3e0,#f3e5f5)}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.25;pointer-events:none}
.o1{width:400px;height:400px;top:-100px;left:-80px;background:linear-gradient(135deg,#a8c0ff,#3f2b96)}
.o2{width:300px;height:300px;bottom:60px;right:-50px;background:linear-gradient(135deg,#f093fb,#f5576c)}
.o3{width:200px;height:200px;bottom:30%;left:15%;background:linear-gradient(135deg,#fa709a,#fee140)}
.card{background:#fff;border-radius:8px;width:420px;padding:32px;position:relative;z-index:1;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.card h1{text-align:center;font-size:20px;color:#333;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:#666;margin-bottom:4px}
.field input{width:100%;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none}
.field input:focus{border-color:#1890ff}
.btn{width:100%;padding:10px;background:#1890ff;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer}
.link{text-align:center;margin-top:12px;font-size:13px}.link a{color:#1890ff;text-decoration:none}
.hint{font-size:12px;color:#fa8c16;text-align:center;margin:8px 0}
</style></head>
<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="card">
<h1>注册商家账号</h1>
<div class="field"><label>手机号</label><input id="phone" placeholder="请输入手机号"></div>
<div class="field"><label>验证码</label><div style="display:flex;gap:8px"><input id="code" placeholder="输入验证码" style="flex:1;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none"><button id="codeBtn" onclick="getCode()" style="white-space:nowrap;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer">获取验证码</button></div></div>
<div class="field"><label>猫舍名称</label><input id="name" placeholder="输入猫舍名称"></div>
<div class="field"><label>联系人</label><input id="contact" placeholder="联系人姓名"></div>
<div class="field"><label>密码</label><input id="password" type="password" placeholder="设置登录密码"></div>
<div class="field"><label>确认密码</label><input id="confirm" type="password" placeholder="再次输入密码"></div>
<div style="font-size:12px;color:#999;text-align:center;margin:8px 0">注册即表示同意《服务协议》</div>
<button class="btn" onclick="doRegister()">注册并开通</button>
<div class="link"><a href="/">已有账号？去登录</a></div>
</div>
<script>
function validatePhone() {
    var inp = document.getElementById('phone');
    var btn = document.getElementById('codeBtn');
    var v = inp.value.trim();
    var valid = /^1[3-9]\d{9}$/.test(v);
    var el = document.getElementById('phoneStatus');
    if (!el) {
        el = document.createElement('span');
        el.id = 'phoneStatus';
        el.style.cssText = 'position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:16px;font-weight:bold;';
        inp.parentNode.style.position = 'relative';
        inp.parentNode.appendChild(el);
    }
    if (v.length === 0) {
        inp.style.borderColor = '#d9d9d9';
        el.textContent = '';
        btn.disabled = true;
    } else if (valid) {
        inp.style.borderColor = '#52c41a';
        el.textContent = '\u2713';
        el.style.color = '#52c41a';
        btn.disabled = false;
    } else {
        inp.style.borderColor = '#ff4d4f';
        el.textContent = '\u2717';
        el.style.color = '#ff4d4f';
        btn.disabled = true;
    }
    btn.style.opacity = btn.disabled ? '0.4' : '1';
    btn.style.cursor = btn.disabled ? 'not-allowed' : 'pointer';
}
document.addEventListener('DOMContentLoaded', function() {
    var inp = document.getElementById('phone');
    validatePhone();
    inp.addEventListener('input', validatePhone);
    inp.addEventListener('blur', function() {
        if (inp.value.trim().length > 0 && !/^1[3-9]\d{9}$/.test(inp.value.trim())) {
            inp.style.borderColor = '#ff4d4f';
        }
    });
});

function getClientId() {
    let id = localStorage.getItem("cat_sys_client_id");
    if (!id) { id = "dev_" + Date.now() + "_" + Math.random().toString(36).slice(2,8); localStorage.setItem("cat_sys_client_id", id); }
    return id;
}
function getCode() {
    const phone = document.getElementById("phone").value;
    if (!phone || phone.length < 11) { alert("请输入正确的手机号"); return; }
    const btn = document.getElementById("codeBtn");
    btn.disabled = true;
    btn.textContent = "发送中...";
    api("/auth/send-code", { method: "POST", body: JSON.stringify({ phone, type: "register" }) }).then(r => {
        if (r.code === 0) {
            let sec = 59;
            btn.textContent = sec + "s";
            const t = setInterval(() => { sec--; btn.textContent = sec + "s"; if(sec<=0){clearInterval(t);btn.disabled=false;btn.textContent="获取验证码";} }, 1000);
        } else {
            alert(r.detail || "发送失败");
            btn.disabled = false;
            btn.textContent = "获取验证码";
        }
    }).catch(() => { btn.disabled = false; btn.textContent = "获取验证码"; });
}
async function doRegister() {
    const phone = document.getElementById("phone").value;
    const code = document.getElementById("code").value;
    const name = document.getElementById("name").value;
    const contact = document.getElementById("contact").value;
    const pass = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;
    if (!phone || !code || !name || !contact || !pass) { alert("请填写所有必填项"); return; }
    if (pass !== confirm) { alert("两次密码不一致"); return; }
    const res = await api("/auth/register", {
        method: "POST",
        body: JSON.stringify({ phone, password: pass, business_name: name, contact_person: contact, code, client_id: getClientId() })
    });
    if (res.code === 0) {
        alert("注册成功，请登录");
        window.location.href = "/";
    } else if (res.detail && res.detail.indexOf("最多注册") >= 0) {
        alert(res.detail);
    } else {
        alert(res.detail || "注册失败");
    }
}
</script></body></html>
