<div class="content">
<div class="page-title">销售管理 &gt; 预订管理</div>
<div class="wf-toolbar"><div class="filters"><select class="wf-select"><option>全部状态</option></select><div class="wf-input" style="width:130px;">开始日期</div><div class="wf-input" style="width:130px;">结束日期</div></div><div class="actions"><span class="wf-btn primary small">+ 创建预订</span><span class="wf-btn small">+ 创建合同</span></div></div>

<tr><td>1</td><td>王芳</td><td>咪咪</td><td>&yen;2,000</td><td>&yen;12,000</td><td><span class="wf-badge blue">已付定金</span></td><td><span class="wf-btn small">签合同</span></td></tr>

<div class="wf-form-row"><label>预订日期</label><div class="wf-input" style="flex:1;">2026-07-09</div></div>
<div class="wf-form-row"><label>定金金额</label><div class="wf-input" style="flex:1;width:150px;">2000</div><span style="margin-left:4px;color:#999;">元</span></div>
<div class="wf-form-row"><label>备注</label><div class="wf-input" style="flex:1;">备注信息</div></div>
</div>
<div class="wf-modal-footer"><span class="wf-btn">取消</span><span class="wf-btn primary">提交</span></div>
