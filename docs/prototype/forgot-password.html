<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>忘记密码 - Cat_Sys v0.1 原型</title>
<link rel="stylesheet" href="prototype.css">
<style>
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#f0f4ff 0%,#e8eeff 25%,#fce4ec 50%,#fff3e0 75%,#f3e5f5 100%);
  background-size:400% 400%;
}
.login-orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.25;pointer-events:none;z-index:0;}
.login-orb.o1{width:400px;height:400px;top:-100px;left:-80px;background:linear-gradient(135deg,#a8c0ff,#3f2b96);}
.login-orb.o2{width:300px;height:300px;bottom:60px;right:-50px;background:linear-gradient(135deg,#f093fb,#f5576c);}
.login-orb.o3{width:250px;height:250px;top:40%;left:55%;background:linear-gradient(135deg,#4facfe,#00f2fe);}
.login-orb.o4{width:180px;height:180px;bottom:30%;left:15%;background:linear-gradient(135deg,#fa709a,#fee140);}
.login-orb.o5{width:350px;height:350px;top:10%;right:20%;background:linear-gradient(135deg,#a18cd1,#fbc2eb);opacity:0.15;}
.login-orb.o6{width:200px;height:200px;bottom:10%;left:40%;background:linear-gradient(135deg,#ffecd2,#fcb69f);}
.login-box{background:#fff;border:1px solid #e8e8e8;border-radius:8px;width:420px;padding:36px;position:relative;z-index:1;}
.logo-text{text-align:center;margin-bottom:28px;}
.logo-text .big{font-size:24px;font-weight:600;color:#333;}
</style>
</head>
<body>
<div class="login-wrap">

<div class="login-orb o1"></div>
<div class="login-orb o2"></div>
<div class="login-orb o3"></div>
<div class="login-orb o4"></div>
<div class="login-orb o5"></div>
<div class="login-orb o6"></div>
<div class="login-box">
<div class="logo-text"><div class="big">忘记密码</div></div>
<div class="wf-form-row"><label style="width:80px;">手机号</label><div class="wf-input" style="flex:1;">请输入注册手机号</div></div>
<div class="wf-form-row"><label style="width:80px;">验证码</label><div style="flex:1;display:flex;gap:8px;"><div class="wf-input" style="flex:1;">输入验证码</div><div class="wf-btn small" style="white-space:nowrap;">获取验证码</div></div></div>
<div class="wf-form-row"><label style="width:80px;">新密码</label><div class="wf-input" style="flex:1;">请输入新密码</div></div>
<div class="wf-form-row"><label style="width:80px;">确认密码</label><div class="wf-input" style="flex:1;">再次输入新密码</div></div>
<div style="margin-top:24px;"><div class="wf-btn primary" style="width:100%;text-align:center;padding:10px;">重置密码</div></div>
<div style="text-align:center;margin-top:16px;"><a href="login.html" style="font-size:13px;color:#1890ff;">返回登录</a></div>
</div>
</div>
</body>
</html>
