<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登录 - 猫咪管理系统 v0.1 原型</title>
<link rel="stylesheet" href="prototype.css">
<style>
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#f0f4ff 0%,#e8eeff 25%,#fce4ec 50%,#fff3e0 75%,#f3e5f5 100%);
  background-size:400% 400%;
}
.login-orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.25;pointer-events:none;z-index:0;}
.login-orb.o1{width:400px;height:400px;top:-100px;left:-80px;background:linear-gradient(135deg,#a8c0ff,#3f2b96);}
.login-orb.o2{width:300px;height:300px;bottom:60px;right:-50px;background:linear-gradient(135deg,#f093fb,#f5576c);}
.login-orb.o3{width:250px;height:250px;top:40%;left:55%;background:linear-gradient(135deg,#4facfe,#00f2fe);}
.login-orb.o4{width:180px;height:180px;bottom:30%;left:15%;background:linear-gradient(135deg,#fa709a,#fee140);}
.login-orb.o5{width:350px;height:350px;top:10%;right:20%;background:linear-gradient(135deg,#a18cd1,#fbc2eb);opacity:0.15;}
.login-orb.o6{width:200px;height:200px;bottom:10%;left:40%;background:linear-gradient(135deg,#ffecd2,#fcb69f);}
.login-box{background:#fff;border:1px solid #e8e8e8;border-radius:8px;width:400px;padding:36px;position:relative;z-index:1;}
.logo-text{text-align:center;margin-bottom:28px;}
.logo-text .big{font-size:28px;font-weight:700;color:#1890ff;}
.forgot-link{text-align:right;margin-top:8px;}
.forgot-link a{font-size:13px;color:#999;}
.forgot-link a:hover{color:#1890ff;}
</style>
</head>
<body>
<div class="login-wrap">

<div class="login-orb o1"></div>
<div class="login-orb o2"></div>
<div class="login-orb o3"></div>
<div class="login-orb o4"></div>
<div class="login-orb o5"></div>
<div class="login-orb o6"></div>
<div class="login-box">
<div class="logo-text"><div class="big">猫咪管理系统</div></div>
<div class="wf-form-row"><label style="width:70px;">账号</label><div class="wf-input" style="flex:1;">请输入手机号</div></div>
<div class="wf-form-row"><label style="width:70px;">密码</label><div class="wf-input" style="flex:1;">请输入密码</div></div>
<div class="forgot-link"><a href="forgot-password.html">忘记密码？</a></div>
<div style="margin-top:16px;"><div class="wf-btn primary" style="width:100%;text-align:center;padding:10px;">登 录</div></div>
<div style="text-align:center;margin-top:16px;"><a href="register.html" style="font-size:13px;color:#1890ff;">还没有账号？立即注册</a></div>
</div>
</div>
</body>
</html>
