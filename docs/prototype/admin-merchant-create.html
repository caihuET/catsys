<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>创建商家 - Cat_Sys v0.1 原型</title><link rel="stylesheet" href="prototype.css"></head>
<body>
<div class="layout">
<div class="sidebar">
<div class="logo"> <span>猫咪</span>管理系统</div>
<div class="nav-item"><span>&#x1F4CA;</span><span>控制台</span></div>
<div class="nav-item active"><span>&#x1F3E2;</span><span>商家管理</span></div>
<div class="nav-item"><span>&#x1F9E9;</span><span>模块管理</span></div>
<div class="nav-item"><span>&#x2699;</span><span>系统配置</span></div>
<div class="nav-item"><span>&#x1F4DC;</span><span>审计日志</span></div>
<div class="nav-item"><span>&#x1F4C8;</span><span>数据统计</span></div>
</div>
<div class="main">
<div class="header"><div class="left"><span style="font-weight:600;color:#1890ff;">猫咪管理系统后台</span></div><div class="right"><span>张三 139****567(超管) &#x25BC;</span></div></div>
<div class="content">
<div class="page-title">商家管理 &gt; 新增商家</div>
<div class="wf-card"><div class="wf-card-title">基本信息</div>
<div class="wf-form-row"><label>猫舍名称</label><div class="wf-input" style="flex:1;">输入猫舍名称</div><span style="color:red;">*</span></div>
<div class="wf-form-row"><label>营业执照号</label><div class="wf-input" style="flex:1;">输入营业执照号</div></div>
<div class="wf-form-row"><label>联系人</label><div class="wf-input" style="flex:1;">联系人姓名</div><span style="color:red;">*</span></div>
<div class="wf-form-row"><label>联系电话</label><div class="wf-input" style="flex:1;">联系电话</div><span style="color:red;">*</span></div>
<div class="wf-form-row"><label>地址</label><div class="wf-input" style="flex:1;">详细地址</div></div>
</div>
<div class="wf-card"><div class="wf-card-title">账号信息</div>
<div class="wf-form-row"><label>登录手机号</label><div class="wf-input" style="flex:1;">手机号(将作为登录名)</div><span style="color:red;">*</span></div>
<div class="wf-form-row"><label>初始密码</label><div class="wf-input" style="flex:1;">设置初始密码</div><span style="color:red;">*</span></div>
</div>
<div class="wf-card"><div class="wf-card-title">有效期</div>
<div class="wf-form-row"><label>过期日期</label><div class="wf-input" style="flex:1;width:200px;">2026-12-31</div></div>
</div>
<div class="wf-card"><div class="wf-card-title">开通高级模块(默认全开)</div>
<div style="display:flex;flex-wrap:wrap;gap:8px;padding:8px 0;">
<span style="display:inline-block;padding:2px 8px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:4px;font-size:12px;">&#x2713; 销售管理</span>
<span style="display:inline-block;padding:2px 8px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:4px;font-size:12px;">&#x2713; 健康管理Pro</span>
<span style="display:inline-block;padding:2px 8px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:4px;font-size:12px;">&#x2713; 合同与证书</span>
<span style="display:inline-block;padding:2px 8px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:4px;font-size:12px;">&#x2713; 财务报表</span>
<span style="display:inline-block;padding:2px 8px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:4px;font-size:12px;">&#x2713; 批量导入导出</span>
<span style="display:inline-block;padding:2px 8px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:4px;font-size:12px;">&#x2713; API接口</span>
<span style="display:inline-block;padding:2px 8px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:4px;font-size:12px;">&#x2713; 客户自动跟进</span>
</div></div>
<div class="wf-card" style="text-align:right;"><span class="wf-btn">取消</span><span class="wf-btn primary">保存</span></div>
</div></div></div></body></html>
